name: Android CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  release:
    types: [ published ]

env:
  ANDROID_HOME: /home/runner/android-sdk
  ANDROID_SDK_ROOT: /home/runner/android-sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076700'
          packages: |
            platform-tools
            platforms;android-34
            build-tools;34.0.0
            ndk;25.2.9519653
            cmake;3.22.1
          accept-android-sdk-licenses: true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/25.2.9519653" >> local.properties

      - name: Download OpenCV Android SDK
        run: |
          mkdir -p OpenCV-android-sdk
          cd OpenCV-android-sdk
          curl -sL https://sourceforge.net/projects/opencvlibrary/files/4.6.0/opencv-4.6.0-android-sdk.zip/download -o opencv.zip || wget -q https://github.com/nicehero/opencv/releases/download/4.6.0/opencv-4.6.0-android-sdk.zip -O opencv.zip
          unzip -q opencv.zip
          rm opencv.zip
          ls -la

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -100

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Show build logs on failure
        if: failure()
        run: |
          cat app/build/outputs/logs/*.log 2>/dev/null || echo "No build logs available"

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076700'
          packages: |
            platform-tools
            platforms;android-34
            build-tools;34.0.0
            ndk;25.2.9519653
            cmake;3.22.1

      - name: Download OpenCV Android SDK
        run: |
          mkdir -p OpenCV-android-sdk
          cd OpenCV-android-sdk
          curl -sL https://sourceforge.net/projects/opencvlibrary/files/4.6.0/opencv-4.6.0-android-sdk.zip/download -o opencv.zip || wget -q https://github.com/nicehero/opencv/releases/download/4.6.0/opencv-4.6.0-android-sdk.zip -O opencv.zip
          unzip -q opencv.zip
          rm opencv.zip

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/25.2.9519653" >> local.properties

      - name: Build release APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore
          fi
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon 2>&1 | tail -30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
