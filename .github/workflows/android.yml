name: Android CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Android SDK
        uses: actions/cache@v3
        with:
          path: |
            ~/android-sdk/ndk
            ~/android-sdk/cmake
          key: ${{ runner.os }}-android-ndk-${{ hashFiles('.github/workflows/android.yml') }}
          restore-keys: |
            ${{ runner.os }}-android-ndk-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download OpenCV Android SDK
        run: |
          mkdir -p OpenCV-android-sdk
          cd OpenCV-android-sdk
          wget -q https://github.com/nicehero/opencv/releases/download/4.6.0/opencv-4.6.0-android-sdk.zip -O opencv.zip
          unzip -q opencv.zip
          rm opencv.zip
          ls -la

      - name: Build debug APK
        run: |
          ./gradlew assembleDebug --no-daemon --warning-mode=none 2>&1 || true

      - name: Build with NDK
        run: |
          export ANDROID_NDK_HOME=$HOME/android-sdk/ndk/25.2.9519653
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -50

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download OpenCV Android SDK
        run: |
          mkdir -p OpenCV-android-sdk
          cd OpenCV-android-sdk
          wget -q https://github.com/nicehero/opencv/releases/download/4.6.0/opencv-4.6.0-android-sdk.zip -O opencv.zip
          unzip -q opencv.zip
          rm opencv.zip

      - name: Build release APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo $KEYSTORE_BASE64 | base64 -d > app/release.keystore
          ./gradlew assembleRelease --no-daemon 2>&1 | tail -30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
